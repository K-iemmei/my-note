<!DOCTYPE html>
<html>
<head>
  <title>Admin VSCode CMS Level 2</title>

  <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }

    #loginBox { padding: 20px; }

    #editorApp {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    .main {
      display: flex;
      height: 90vh;
    }

    #explorer {
      width: 220px;
      background: #1e1e1e;
      color: white;
      padding: 10px;
    }

    #explorer div {
      padding: 6px;
      cursor: pointer;
    }

    #explorer div:hover {
      background: #333;
    }

    #container {
      flex: 1;
      height: 100%;
    }

    #topbar {
      padding: 10px;
      background: #eee;
    }
  </style>
</head>

<body>

<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="pw" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="editorApp">
  <div id="topbar">
    <button onclick="save()">💾 Save (Ctrl+S)</button>
    <input type="file" id="uploadNotebook" accept=".ipynb">
    <span id="status"></span>
      <button onclick="uploadPost()">🚀 Publish Notebook</button>

  </div>

  <div class="main">
    <div id="explorer"></div>
    <div id="container"></div>
  </div>
</div>

const supabase = createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const PASSWORD = "1234";

let editor;
let files = [];
let currentFileId = null;

window.login = function(){

  const pw = document.getElementById("pw").value;

  if(pw === PASSWORD){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("editorApp").style.display = "flex";
    initEditor();
  }else{
    alert("Wrong password");
  }

}

function initEditor(){

  require.config({
    paths:{
      vs:"https://unpkg.com/monaco-editor@0.45.0/min/vs"
    }
  });

  require(["vs/editor/editor.main"],function(){

    editor = monaco.editor.create(
      document.getElementById("container"),
      {
        value:"",
        language:"html",
        theme:"vs-dark",
        automaticLayout:true
      }
    );

    loadFiles();

  });

}

async function loadFiles(){

  const {data,error} = await supabase
    .from("files")
    .select("*")
    .order("id");

  if(error){
    console.log(error);
    return;
  }

  files = data;
  renderExplorer();

}

function renderExplorer(){

  const box = document.getElementById("explorer");

  box.innerHTML = "<h3>FILES</h3>";

  files.forEach(f=>{

    const div = document.createElement("div");

    div.innerHTML = "📄 " + f.name;

    div.onclick = ()=>openFile(f.id);

    box.appendChild(div);

  });

}

function openFile(id){

  const file = files.find(f=>f.id===id);

  currentFileId = id;

  editor.setValue(file.content);

}
window.save = async function(){

  if(currentFileId === null){
    alert("Please select a file.");
    return;
  }

  const content = editor.getValue();

  const { error } = await supabase
    .from("files")
    .update({
      content: content
    })
    .eq("id", currentFileId);

  if(error){
    console.log(error);
    document.getElementById("status").innerText = "Save failed";
    return;
  }

  const file = files.find(f => f.id === currentFileId);

  if(file){
    file.content = content;
  }

  document.getElementById("status").innerText = "Saved ✔";

  setTimeout(()=>{
    document.getElementById("status").innerText = "";
  },1500);

}

function escapeHtml(str){
    return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

.nb-wrap{
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
  font-size: 16px;
  line-height: 1.6;
  color: #1f2328;
  max-width: 900px;
  margin: 0 auto;
}
.nb-wrap h1, .nb-wrap h2, .nb-wrap h3, .nb-wrap h4, .nb-wrap h5, .nb-wrap h6 {
  font-weight: 600 !important;
  line-height: 1.25 !important;
  margin-top: 24px !important;
  margin-bottom: 16px !important;
  padding-bottom: .3em;
  display: block;
}
.nb-wrap h1, .nb-wrap h2 {
  border-bottom: 1px solid #d1d9e0;
}
.nb-wrap h1 { font-size: 2em !important; }
.nb-wrap h2 { font-size: 1.5em !important; }
.nb-wrap h3 { font-size: 1.25em !important; border-bottom: none; }
.nb-wrap h4 { font-size: 1em !important; }
.nb-wrap h5 { font-size: .875em !important; }
.nb-wrap h6 { font-size: .85em !important; color: #59636e; }
.nb-wrap .katex-display {
  overflow-x: auto;
  overflow-y: hidden;
  padding: 8px 0;
}
.nb-wrap p { margin: 0 0 16px 0; }
.nb-wrap a { color: #0969da; text-decoration: none; }
.nb-wrap a:hover { text-decoration: underline; }
.nb-wrap ul, .nb-wrap ol { padding-left: 2em; margin-bottom: 16px; }
.nb-wrap blockquote {
  margin: 0 0 16px 0;
  padding: 0 1em;
  color: #59636e;
  border-left: .25em solid #d1d9e0;
}
.nb-wrap code {
  font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  font-size: 85%;
  background: rgba(129,139,152,0.12);
  padding: .2em .4em;
  border-radius: 6px;
}
.nb-cell {
  margin-bottom: 16px;
}
.nb-markdown {
  padding: 4px 2px;
}
.nb-code-cell {
  border: 1px solid #d1d9e0;
  border-radius: 6px;
  overflow: hidden;
}
.nb-code-cell pre {
  margin: 0;
  padding: 16px;
  overflow-x: auto;
  background: #f6f8fa;
  font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  font-size: 13px;
  line-height: 1.45;
  color: #1f2328;
}
.nb-code-cell pre code {
  background: none;
  padding: 0;
  border-radius: 0;
  font-size: 100%;
}
.nb-output {
  border-top: 1px solid #d1d9e0;
  background: #ffffff;
  padding: 16px;
  font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  font-size: 13px;
  white-space: pre-wrap;
  color: #1f2328;
}
.nb-output img { max-width: 100%; }
.nb-error {
  border-top: 1px solid #d1d9e0;
  background: #fff8f8;
  padding: 16px;
  font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  font-size: 13px;
  color: #b3261e;
  white-space: pre-wrap;
}
</style>
`;

/* ==========================
   LaTeX rendering (KaTeX)
   Tách công thức ra khỏi source
   bằng placeholder trước khi cho
   marked xử lý, sau đó chèn lại
   HTML KaTeX đã render.
========================== */

function renderMathToPlaceholders(source){

    const store = [];

    function stash(renderFn){
        const token = `@@MATH_${store.length}@@`;
        store.push(renderFn);
        return token;
    }

    // $$...$$ (display, có thể nhiều dòng)
    let out = source.replace(/\$\$([\s\S]+?)\$\$/g, (match, expr)=>{
        return stash(()=>{
            try{
                return katex.renderToString(expr.trim(), { displayMode:true, throwOnError:false });
            }catch(e){
                return `<pre>${escapeHtml(match)}</pre>`;
            }
        });
    });

    // \[ ... \] (display, cú pháp thay thế)
    out = out.replace(/\\\[([\s\S]+?)\\\]/g, (match, expr)=>{
        return stash(()=>{
            try{
                return katex.renderToString(expr.trim(), { displayMode:true, throwOnError:false });
            }catch(e){
                return `<pre>${escapeHtml(match)}</pre>`;
            }
        });
    });

    // $...$ (inline, không chứa xuống dòng, không dính sát chữ số $ tiền tệ kiểu $5)
    out = out.replace(/(?<!\$)\$(?!\$)([^\n$]+?)\$(?!\$)/g, (match, expr)=>{
        return stash(()=>{
            try{
                return katex.renderToString(expr.trim(), { displayMode:false, throwOnError:false });
            }catch(e){
                return `<code>${escapeHtml(match)}</code>`;
            }
        });
    });

    // \( ... \) (inline, cú pháp thay thế)
    out = out.replace(/\\\(([\s\S]+?)\\\)/g, (match, expr)=>{
        return stash(()=>{
            try{
                return katex.renderToString(expr.trim(), { displayMode:false, throwOnError:false });
            }catch(e){
                return `<code>${escapeHtml(match)}</code>`;
            }
        });
    });

    return { text: out, store };

}

function restoreMath(html, store){

    return html.replace(/@@MATH_(\d+)@@/g, (match, idx)=>{
        const renderFn = store[Number(idx)];
        return renderFn ? renderFn() : match;
    });

}

function renderMarkdownWithMath(source){

    const { text, store } = renderMathToPlaceholders(source);

    let html = marked.parse(text);

    html = restoreMath(html, store);

    return html;

}

function renderOutputs(outputs){

    if(!outputs || outputs.length === 0) return "";

    let html = "";

    outputs.forEach(out=>{

        if(out.output_type === "stream"){
            const text = Array.isArray(out.text) ? out.text.join("") : out.text;
            html += `<div class="nb-output">${escapeHtml(text)}</div>`;
        }

        if(out.output_type === "execute_result" || out.output_type === "display_data"){

            const data = out.data || {};

            if(data["image/png"]){
                html += `<div class="nb-output"><img src="data:image/png;base64,${data["image/png"]}"></div>`;
            } else if(data["text/html"]){
                const text = Array.isArray(data["text/html"]) ? data["text/html"].join("") : data["text/html"];
                html += `<div class="nb-output">${text}</div>`;
            } else if(data["text/plain"]){
                const text = Array.isArray(data["text/plain"]) ? data["text/plain"].join("") : data["text/plain"];
                html += `<div class="nb-output">${escapeHtml(text)}</div>`;
            }

        }

        if(out.output_type === "error"){
            const trace = Array.isArray(out.traceback) ? out.traceback.join("\n") : (out.ename + ": " + out.evalue);
            html += `<div class="nb-error">${escapeHtml(trace)}</div>`;
        }

    });

    return html;

}

function highlightCode(code, lang){

    try{
        if(lang && hljs.getLanguage(lang)){
            return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
    }catch(e){
        return escapeHtml(code);
    }

}

function getNotebookLanguage(notebook){

    const meta = notebook.metadata || {};

    return (
        (meta.language_info && meta.language_info.name) ||
        (meta.kernelspec && meta.kernelspec.language) ||
        "python"
    );

}

function convertNotebookToHTML(notebook){

    let body = "";

    const lang = getNotebookLanguage(notebook);

    for(const cell of notebook.cells){

        const source = Array.isArray(cell.source) ? cell.source.join("") : (cell.source || "");

        if(cell.cell_type === "markdown"){
            body += `<div class="nb-cell nb-markdown">${renderMarkdownWithMath(source)}</div>`;
        }

        if(cell.cell_type === "code"){
            const codeHtml = highlightCode(source, lang);
            const outputsHtml = renderOutputs(cell.outputs);
            body += `
                <div class="nb-cell nb-code-cell">
                    <pre><code class="hljs language-${lang}">${codeHtml}</code></pre>
                    ${outputsHtml}
                </div>
            `;
        }
    }

    return `${NOTEBOOK_CSS}<div class="nb-wrap">${body}</div>`;

}

window.uploadPost = async function(){

    const fileInput = document.getElementById("uploadNotebook");

    const file = fileInput.files[0];

    if(!file){
        alert("Chưa chọn notebook");
        return;
    }

    const text = await file.text();
    const notebook = JSON.parse(text);

    const html = convertNotebookToHTML(notebook);

    // lấy title từ cell đầu tiên
    let title = "Untitled";

    for(const cell of notebook.cells){
        if(cell.cell_type === "markdown"){
            const source = Array.isArray(cell.source) ? cell.source.join("") : cell.source;
            title = source.replace(/^#+\s*/, "").split("\n")[0].trim();
            break;
        }
    }

    const slug = title.toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9\s-]/g, "")
        .trim()
        .replace(/\s+/g, "-");

    const { error } = await supabase
        .from("posts")
        .insert({
            title: title,
            slug: slug,
            content: html
        });

   if(error){
    console.log("SUPABASE ERROR:", error);
    alert(JSON.stringify(error, null, 2));
    return;
}

    alert("Published ✔");
}
