let editor;

window.login = function(){

  const pw = document.getElementById("pw").value;

  if(pw === PASSWORD){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("editorApp").style.display = "flex";

function initEditor(){

  require.config({
    paths:{
      vs:"https://unpkg.com/monaco-editor@0.45.0/min/vs"
    }
  });

  require(["vs/editor/editor.main"],function(){

    editor = monaco.editor.create(
      document.getElementById("container"),
      {
        value:"",
        language:"html",
        theme:"vs-dark",
        automaticLayout:true
      }
    );

    loadFiles();

  });

}

async function loadFiles(){

  const {data,error} = await supabase
    .from("files")
    .select("*")
    .order("id");

  if(error){
    console.log(error);
    return;
  }

  files = data;
  renderExplorer();

}

function renderExplorer(){

  const box = document.getElementById("explorer");

  box.innerHTML = "<h3>FILES</h3>";

  files.forEach(f=>{

    const div = document.createElement("div");

    div.innerHTML = "📄 " + f.name;

    div.onclick = ()=>openFile(f.id);

    box.appendChild(div);

  });

}

function openFile(id){

  const file = files.find(f=>f.id===id);

  currentFileId = id;

  editor.setValue(file.content);

}
window.save = async function(){

  if(currentFileId === null){
    alert("Please select a file.");
    return;
  }

  const content = editor.getValue();

  const { error } = await supabase
    .from("files")
    .update({
      content: content
    })
    .eq("id", currentFileId);

  if(error){
    console.log(error);
    document.getElementById("status").innerText = "Save failed";
    return;
  }

  const file = files.find(f => f.id === currentFileId);

  if(file){
    file.content = content;
  }

  document.getElementById("status").innerText = "Saved ✔";

  setTimeout(()=>{
    document.getElementById("status").innerText = "";
  },1500);

}

/* ==========================
   Notebook -> GitHub-style HTML
   (fonts, spacing, code blocks
   giống Jupyter render trên GitHub)
========================== */

function escapeHtml(str){
    return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
}

// CSS scoped, tự chứa trong nội dung post (vì content sẽ được
// nhúng vào nơi khác nên không thể phụ thuộc CSS ngoài trang admin)

`;

function renderOutputs(outputs){

    if(!outputs || outputs.length === 0) return "";

    let html = "";

    outputs.forEach(out=>{

        if(out.output_type === "stream"){
            const text = Array.isArray(out.text) ? out.text.join("") : out.text;
            html += `<div class="nb-output">${escapeHtml(text)}</div>`;
        }

        if(out.output_type === "execute_result" || out.output_type === "display_data"){

            const data = out.data || {};

            if(data["image/png"]){
                html += `<div class="nb-output"><img src="data:image/png;base64,${data["image/png"]}"></div>`;
            } else if(data["text/html"]){
                const text = Array.isArray(data["text/html"]) ? data["text/html"].join("") : data["text/html"];
                html += `<div class="nb-output">${text}</div>`;
            } else if(data["text/plain"]){
                const text = Array.isArray(data["text/plain"]) ? data["text/plain"].join("") : data["text/plain"];
                html += `<div class="nb-output">${escapeHtml(text)}</div>`;
            }

        }

        if(out.output_type === "error"){
            const trace = Array.isArray(out.traceback) ? out.traceback.join("\n") : (out.ename + ": " + out.evalue);
            html += `<div class="nb-error">${escapeHtml(trace)}</div>`;
        }

    });

    return html;

}

function convertNotebookToHTML(notebook){

    let body = "";

    for(const cell of notebook.cells){

        const source = Array.isArray(cell.source) ? cell.source.join("") : (cell.source || "");

        if(cell.cell_type === "markdown"){
            body += `<div class="nb-cell nb-markdown">${marked.parse(source)}</div>`;
        }

        if(cell.cell_type === "code"){
            const codeHtml = escapeHtml(source);
            const outputsHtml = renderOutputs(cell.outputs);
            body += `
                <div class="nb-cell nb-code-cell">
                    <pre><code>${codeHtml}</code></pre>
                    ${outputsHtml}
                </div>
            `;
        }
    }

    return `${NOTEBOOK_CSS}<div class="nb-wrap">${body}</div>`;

}

window.uploadPost = async function(){

    const fileInput = document.getElementById("uploadNotebook");

    const file = fileInput.files[0];

    if(!file){
        alert("Chưa chọn notebook");
        return;
    }

    const text = await file.text();
    const notebook = JSON.parse(text);

    const html = convertNotebookToHTML(notebook);

    // lấy title từ cell đầu tiên
    let title = "Untitled";

    for(const cell of notebook.cells){
        if(cell.cell_type === "markdown"){
            const source = Array.isArray(cell.source) ? cell.source.join("") : cell.source;
            title = source.replace(/^#+\s*/, "").split("\n")[0].trim();
            break;
        }
    }

    const slug = title.toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9\s-]/g, "")
        .trim()
        .replace(/\s+/g, "-");

    const { error } = await supabase
        .from("posts")
        .insert({
            title: title,
            slug: slug,
            content: html
        });

   if(error){
    console.log("SUPABASE ERROR:", error);
    alert(JSON.stringify(error, null, 2));
    return;
}

    alert("Published ✔");
}
