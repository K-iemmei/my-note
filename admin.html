<!DOCTYPE html>
<html>
<head>
  <title>Admin VSCode CMS Level 2</title>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }

    #loginBox { padding: 20px; }

    #editorApp {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    .main {
      display: flex;
      height: 90vh;
    }

    #explorer {
      width: 220px;
      background: #1e1e1e;
      color: white;
      padding: 10px;
    }

    #explorer div {
      padding: 6px;
      cursor: pointer;
    }

    #explorer div:hover {
      background: #333;
    }

    #container {
      flex: 1;
      height: 100%;
    }

    #topbar {
      padding: 10px;
      background: #eee;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="pw" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="editorApp">

  <div id="topbar">
    <button onclick="save()">💾 Save (Ctrl+S)</button>
    <span id="status"></span>
  </div>

  <div class="main">

    <div id="explorer"></div>

    <div id="container"></div>

  </div>

</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

/* =====================
   CONFIG
===================== */
const SUPABASE_URL = "https://lmqukgeyfmxprgkrujff.supabase.co";

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxtcXVrZ2V5Zm14cHJna3J1amZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMzQ5NTMsImV4cCI6MjA5ODgxMDk1M30.mz7NTaWXqcokWnuYb2k65dWmgvywpFpemnJcsO3UFk0";

const supabase = createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const PASSWORD = "1234";

/* =====================
   STATE
===================== */
let editor;
let files = [];
let currentFileId = null;

/* =====================
   LOGIN
===================== */
window.login = function () {

  const pw = document.getElementById("pw").value;

  if (pw === PASSWORD) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("editorApp").style.display = "flex";
    initEditor();
  } else {
    alert("Wrong password");
  }
};

/* =====================
   INIT EDITOR
===================== */
function initEditor() {

  require.config({
    paths: {
      vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs"
    }
  });

  require(["vs/editor/editor.main"], function () {

    editor = monaco.editor.create(document.getElementById("container"), {
      value: "",
      language: "html",
      theme: "vs-dark",
      automaticLayout: true
    });

    loadFiles();
  });

}

/* =====================
   LOAD FILES
===================== */
async function loadFiles() {

  const { data, error } = await supabase
    .from("files")
    .select("*")
    .order("id");

  if (error) {
    console.error(error);
    return;
  }

  files = data;
  renderExplorer();

}

/* =====================
   RENDER EXPLORER
===================== */
function renderExplorer() {

  const box = document.getElementById("explorer");
  box.innerHTML = "<h3>FILES</h3>";

  files.forEach(f => {

    const div = document.createElement("div");
    div.innerHTML = "📄 " + f.name;
    div.onclick = () => openFile(f.id);

    box.appendChild(div);

  });

}

/* =====================
   OPEN FILE
===================== */
function openFile(id) {

  const file = files.find(f => f.id === id);

  currentFileId = id;

  editor.setValue(file.content);

}

/* =====================
   SAVE FILE
===================== */
window.save = async function () {

  const content = editor.getValue();

  const { error } = await supabase
    .from("files")
    .update({
      content: content
    })
    .eq("id", currentFileId);

  if (error) {
    console.error(error);
    document.getElementById("status").innerText = "Save failed";
    return;
  }

  const file = files.find(f => f.id === currentFileId);
  if (file) file.content = content;

  document.getElementById("status").innerText = "Saved ✔";

};

/* =====================
   CTRL + S
===================== */
document.addEventListener("keydown", function (e) {

  if (e.ctrlKey && e.key === "s") {
    e.preventDefault();
    save();
  }

});

</script>

</body>
</html>
