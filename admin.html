<!DOCTYPE html>
<html>
<head>
  <title>Admin VSCode CMS Level 2</title>

  <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }

    #loginBox { padding: 20px; }

    #editorApp {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    .main {
      display: flex;
      height: 90vh;
    }

    #explorer {
      width: 220px;
      background: #1e1e1e;
      color: white;
      padding: 10px;
    }

    #explorer div {
      padding: 6px;
      cursor: pointer;
    }

    #explorer div:hover {
      background: #333;
    }

    #container {
      flex: 1;
      height: 100%;
    }

    #topbar {
      padding: 10px;
      background: #eee;
    }
  </style>
</head>

<body>

<div id="loginBox">
  <h2>Admin Login</h2>
  <input id="pw" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="editorApp">
  <div id="topbar">
    <button onclick="save()">💾 Save (Ctrl+S)</button>
    <input type="file" id="uploadNotebook" accept=".ipynb">
    <span id="status"></span>
      <button onclick="uploadPost()">🚀 Publish Notebook</button>

  </div>

  <div class="main">
    <div id="explorer"></div>
    <div id="container"></div>
  </div>
</div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://lmqukgeyfmxprgkrujff.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxtcXVrZ2V5Zm14cHJna3J1amZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMzQ5NTMsImV4cCI6MjA5ODgxMDk1M30.mz7NTaWXqcokWnuYb2k65dWmgvywpFpemnJcsO3UFk0";

const supabase = createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const PASSWORD = "1234";

let editor;
let files = [];
let currentFileId = null;

window.login = function(){

  const pw = document.getElementById("pw").value;

  if(pw === PASSWORD){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("editorApp").style.display = "flex";
    initEditor();
  }else{
    alert("Wrong password");
  }

}

function initEditor(){

  require.config({
    paths:{
      vs:"https://unpkg.com/monaco-editor@0.45.0/min/vs"
    }
  });

  require(["vs/editor/editor.main"],function(){

    editor = monaco.editor.create(
      document.getElementById("container"),
      {
        value:"",
        language:"html",
        theme:"vs-dark",
        automaticLayout:true
      }
    );

    loadFiles();

  });

}

async function loadFiles(){

  const {data,error} = await supabase
    .from("files")
    .select("*")
    .order("id");

  if(error){
    console.log(error);
    return;
  }

  files = data;
  renderExplorer();

}

function renderExplorer(){

  const box = document.getElementById("explorer");

  box.innerHTML = "<h3>FILES</h3>";

  files.forEach(f=>{

    const div = document.createElement("div");

    div.innerHTML = "📄 " + f.name;

    div.onclick = ()=>openFile(f.id);

    box.appendChild(div);

  });

}

function openFile(id){

  const file = files.find(f=>f.id===id);

  currentFileId = id;

  editor.setValue(file.content);

}
window.save = async function(){

  if(currentFileId === null){
    alert("Please select a file.");
    return;
  }

  const content = editor.getValue();

  const { error } = await supabase
    .from("files")
    .update({
      content: content
    })
    .eq("id", currentFileId);

  if(error){
    console.log(error);
    document.getElementById("status").innerText = "Save failed";
    return;
  }

  const file = files.find(f => f.id === currentFileId);

  if(file){
    file.content = content;
  }

  document.getElementById("status").innerText = "Saved ✔";

  setTimeout(()=>{
    document.getElementById("status").innerText = "";
  },1500);

}
/* ==========================
   Upload Notebook
========================== */

document
.getElementById("uploadNotebook")
.addEventListener("change", loadNotebook);

async function loadNotebook(e){

    const file = e.target.files[0];

    if(!file) return;

    const text = await file.text();

    const notebook = JSON.parse(text);

    console.log(notebook);

    console.log(notebook.cells);

    for(const cell of notebook.cells){

        const html = convertNotebookToHTML(notebook);

        console.log("========== HTML ==========");
        console.log(html);

    }

}
function convertNotebookToHTML(notebook){

    let html = "";

    for(const cell of notebook.cells){

        if(cell.cell_type === "markdown"){

            const text = cell.source.join("");

            html += `<div class="md">${text}</div>`;

        }

        if(cell.cell_type === "code"){

            const code = cell.source.join("");

            html += `
                <pre style="background:#111;color:#0f0;padding:10px;">
<code>${code}</code>
</pre>
            `;
        }
    }

    return html;
}
  window.uploadPost = async function(){

    const fileInput = document.getElementById("uploadNotebook");

    const file = fileInput.files[0];

    if(!file){
        alert("Chưa chọn notebook");
        return;
    }

    const text = await file.text();
    const notebook = JSON.parse(text);

    const html = convertNotebookToHTML(notebook);

    // lấy title từ cell đầu tiên
    let title = "Untitled";

    for(const cell of notebook.cells){
        if(cell.cell_type === "markdown"){
            title = cell.source.join("").replace("#", "").trim();
            break;
        }
    }

    const slug = title.toLowerCase().replace(/\s+/g, "-");

    const { error } = await supabase
        .from("posts")
        .insert({
            title: title,
            slug: slug,
            content: html
        });

   if(error){
    console.log("SUPABASE ERROR:", error);
    alert(JSON.stringify(error, null, 2));
    return;
}

    alert("Published ✔");
}
document.addEventListener("keydown",function(e){

  if(e.ctrlKey && e.key==="s"){
    e.preventDefault();
    save();
  }

});

</script>

</body>
</html>
