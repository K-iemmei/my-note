<!DOCTYPE html>
<html>
<head>
  <title>Home</title>

  <!-- Supabase JS -->
</head>

<body>

<h1 id="content">Loading...</h1>

<script>
/* =====================
   CONFIG
===================== */
const SUPABASE_URL = "https://lmqukgeyfmxprgkrujff.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxtcXVrZ2V5Zm14cHJna3J1amZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMzQ5NTMsImV4cCI6MjA5ODgxMDk1M30.mz7NTaWXqcokWnuYb2k65dWmgvywpFpemnJcsO3UFk0";


/* =====================
   INIT SUPABASE
===================== */
const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

/* =====================
   LOAD INITIAL DATA
===================== */
async function load(){

  const { data, error } = await supabase
    .from('files')
    .select('*')
    .eq('id', 1)
    .single();

  if(error){
    console.log("LOAD ERROR:", error);
    return;
  }

  document.getElementById("content").innerHTML = data.content;
}

load();

/* =====================
   REALTIME LISTENER
===================== */
supabase
  .channel('files-channel')
  .on(
    'postgres_changes',
    {
      event: '*',
      schema: 'public',
      table: 'files'
    },
    (payload) => {

      console.log("CHANGE DETECTED:", payload);

      if(payload.new && payload.new.id === 1){
        document.getElementById("content").innerHTML =
          payload.new.content;
      }

    }
  )
  .subscribe();

</script>

</body>
</html>
